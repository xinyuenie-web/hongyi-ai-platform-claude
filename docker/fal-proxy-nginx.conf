# ============================================================
# fal.ai Reverse Proxy — 部署到香港服务器 43.129.236.142
#
# 用途: 大陆服务器无法直接访问 fal.ai，通过香港服务器转发
#
# 安装方法 (在香港服务器上执行):
#   sudo apt update && sudo apt install -y nginx
#   sudo cp fal-proxy-nginx.conf /etc/nginx/sites-available/fal-proxy
#   sudo ln -sf /etc/nginx/sites-available/fal-proxy /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx
#
# 测试:
#   curl http://43.129.236.142:8462/health
# ============================================================

server {
    listen 8462;
    server_name _;

    # Health check endpoint
    location /health {
        return 200 'fal-proxy OK';
        add_header Content-Type text/plain;
    }

    # Proxy fal.ai queue API (submit jobs)
    location /fal/ {
        proxy_pass https://queue.fal.run/;
        proxy_http_version 1.1;
        proxy_set_header Host queue.fal.run;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # Proxy fal.ai REST API
    location /fal-api/ {
        proxy_pass https://fal.run/;
        proxy_http_version 1.1;
        proxy_set_header Host fal.run;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # Proxy fal.ai media downloads (generated images)
    location /fal-media/ {
        proxy_pass https://v3.fal.media/;
        proxy_http_version 1.1;
        proxy_set_header Host v3.fal.media;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
    }
}
