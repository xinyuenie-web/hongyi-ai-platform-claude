# ============================================================
# 红艺花木 - Nginx 反向代理 (Docker 版)
# 在Docker网络内通过服务名访问各容器
# ============================================================

upstream website {
    server website:3000;
    keepalive 64;
}

upstream api {
    server server:4000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml application/atom+xml image/svg+xml;

    # Next.js 静态资源 - 长期缓存
    location /_next/static {
        proxy_pass http://website;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 静态文件缓存
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        proxy_pass http://website;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # API 代理到 Express 后端 (^~ beats regex, so /api/*.jpg goes here not to website)
    location ^~ /api {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # 上传文件代理 (^~ 优先于正则匹配，确保 .jpg 等不被发到 website)
    location ^~ /uploads {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 所有其他请求代理到 Next.js
    location / {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
