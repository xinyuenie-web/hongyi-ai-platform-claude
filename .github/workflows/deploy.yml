name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_VISION_API_KEY: ${{ secrets.DOUBAO_VISION_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 $SERVER_USER@$SERVER_HOST "bash -s -- '$REPO_URL' '$JWT_SECRET' '$DOUBAO_API_KEY' '$DOUBAO_VISION_API_KEY' '$FAL_KEY' '$DASHSCOPE_API_KEY' '$OPENAI_API_KEY'" << 'ENDSSH'
          set -e
          REPO_URL="$1"
          JWT_SECRET="$2"
          DOUBAO_API_KEY="$3"
          DOUBAO_VISION_API_KEY="$4"
          FAL_KEY="$5"
          DASHSCOPE_API_KEY="$6"
          OPENAI_API_KEY="$7"
          PROJECT_DIR="/opt/hongyi"

          echo "=== Deploy started at $(date) ==="

          # Install Docker if needed
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com | sh
            systemctl start docker
            systemctl enable docker
          fi

          # --- Docker registry mirrors (Docker Hub blocked by GFW) ---
          mkdir -p /etc/docker
          MIRRORS=("docker.xuanyuan.me" "docker.m.daocloud.io" "hub.rat.dev" "docker.1ms.run")
          WORKING_MIRROR=""

          # Pre-pull node:20-alpine via mirrors
          echo "=== Pulling base image via mirrors ==="
          for mirror in "${MIRRORS[@]}"; do
            echo "Trying mirror: $mirror ..."
            if docker pull "$mirror/library/node:20-alpine" 2>&1; then
              docker tag "$mirror/library/node:20-alpine" node:20-alpine
              docker tag "$mirror/library/node:20-alpine" docker.io/library/node:20-alpine
              echo "SUCCESS via $mirror"
              WORKING_MIRROR="$mirror"
              break
            fi
            echo "Mirror $mirror failed, trying next..."
          done
          if [ -z "$WORKING_MIRROR" ]; then
            echo "WARNING: All mirrors failed, trying direct..."
            docker pull node:20-alpine || true
          fi

          # Pull nginx/mongo if not cached
          for img in nginx:alpine mongo:7; do
            if ! docker image inspect "$img" >/dev/null 2>&1; then
              base="${img%%:*}"; tag="${img#*:}"
              for mirror in "${MIRRORS[@]}"; do
                if docker pull "$mirror/library/$base:$tag" 2>&1; then
                  docker tag "$mirror/library/$base:$tag" "$img"
                  break
                fi
              done
            fi
          done

          # Write mirror to daemon.json (only if found)
          if [ -n "$WORKING_MIRROR" ]; then
            echo "{\"registry-mirrors\":[\"https://$WORKING_MIRROR\"],\"log-driver\":\"json-file\",\"log-opts\":{\"max-size\":\"10m\",\"max-file\":\"3\"}}" > /etc/docker/daemon.json
          else
            echo '{"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}' > /etc/docker/daemon.json
          fi
          systemctl daemon-reload
          systemctl restart docker
          sleep 3

          # --- Clone or update code ---
          if [ ! -d "$PROJECT_DIR/.git" ]; then
            rm -rf "$PROJECT_DIR"
            git clone "$REPO_URL" "$PROJECT_DIR"
          fi
          cd "$PROJECT_DIR"
          git fetch origin main
          git reset --hard origin/main
          echo "Version: $(git log --oneline -1)"

          # --- Write .env ---
          cat > .env << ENVEOF
          JWT_SECRET=${JWT_SECRET}
          DOUBAO_API_KEY=${DOUBAO_API_KEY}
          DOUBAO_VISION_API_KEY=${DOUBAO_VISION_API_KEY}
          FAL_KEY=${FAL_KEY}
          DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          FAL_PROXY_URL=http://43.129.236.142:8462
          NEXT_PUBLIC_API_URL=
          NODE_ENV=production
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

          # Stop Baota nginx to free port 80
          nginx -s stop 2>/dev/null || true
          systemctl stop nginx 2>/dev/null || true

          # --- Light cleanup: only remove stopped containers and dangling images ---
          # IMPORTANT: Do NOT run "docker system prune -af" — it destroys build layer cache
          # and forces full rebuilds that take 5+ minutes, causing SSH timeout.
          docker container prune -f 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          echo "=== Disk: $(df -h / | tail -1 | awk '{print $4}') free ==="

          # --- Build and deploy ---
          export DOCKER_BUILDKIT=0
          export COMPOSE_DOCKER_CLI_BUILD=0
          echo "=== Docker build starting (BUILDKIT=0) ==="
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans 2>&1 || {
            echo "=== Docker build FAILED ==="
            docker compose logs --tail=50 server 2>&1 || true
            docker compose logs --tail=50 website 2>&1 || true
            docker ps -a 2>&1 || true
            df -h / 2>&1 || true
            exit 1
          }
          echo "=== Docker build completed ==="

          # --- Health check ---
          sleep 15
          docker compose ps || true
          HEALTH_OK=0
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Health check passed!"
              HEALTH_OK=1
              break
            fi
            echo "Waiting... ($i/8)"
            sleep 5
          done
          if [ "$HEALTH_OK" = "0" ]; then
            echo "=== Health check FAILED ==="
            docker compose logs --tail=30 server 2>&1 || true
            docker compose logs --tail=30 website 2>&1 || true
            docker compose logs --tail=10 nginx 2>&1 || true
          fi

          # Seed data on first deploy
          TREE_COUNT=$(docker compose exec -T server wget -qO- http://localhost:4000/api/v1/trees/meta/stats 2>/dev/null | grep -o '"total":[0-9]*' | grep -o '[0-9]*' || echo "0")
          if [ "$TREE_COUNT" = "0" ] || [ -z "$TREE_COUNT" ]; then
            echo "Seeding data..."
            docker compose exec -T server tsx apps/server/src/scripts/seed-trees.ts || true
          fi

          echo "=== Deploy complete ==="
          ENDSSH
