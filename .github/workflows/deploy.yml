# ============================================================
# 红艺AI花木平台 - GitHub Actions 自动部署
#
# 触发条件: push 到 main 分支
# 流程: 代码推送 → SSH到服务器 → git pull → docker compose 重建部署
#
# 需要在 GitHub 仓库 Settings → Secrets 中配置:
#   SERVER_HOST     = 106.53.112.26
#   SERVER_USER     = root
#   SERVER_SSH_KEY  = SSH私钥内容 (服务器 ~/.ssh/authorized_keys 需有对应公钥)
#   JWT_SECRET      = 生产环境JWT密钥
# ============================================================

name: 🌳 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

env:
  PROJECT_DIR: /opt/hongyi

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 🔒 Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          ssh $SERVER_USER@$SERVER_HOST "REPO_URL='$REPO_URL' JWT_SECRET='$JWT_SECRET' bash -s" << 'DEPLOY_SCRIPT'
            set -e

            PROJECT_DIR="/opt/hongyi"

            echo "=========================================="
            echo "  🌳 红艺花木 - 开始自动部署"
            echo "  时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # 0. 确保 Docker 已安装
            if ! command -v docker &> /dev/null; then
              echo "安装 Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl start docker
              systemctl enable docker
              # 配置国内镜像加速
              mkdir -p /etc/docker
              cat > /etc/docker/daemon.json << 'DOCKERCFG'
{"registry-mirrors":["https://docker.xuanyuan.me"],"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}
DOCKERCFG
              systemctl daemon-reload
              systemctl restart docker
            fi

            # 1. 确保项目目录存在
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "首次部署：克隆仓库..."
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            # 2. 拉取最新代码
            echo ""
            echo "[1/4] 📥 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            echo "当前版本: $(git log --oneline -1)"

            # 3. 创建生产环境 .env
            echo ""
            echo "[2/4] ⚙️  更新环境变量..."
            cat > .env << ENVEOF
JWT_SECRET=${JWT_SECRET}
NEXT_PUBLIC_API_URL=
NODE_ENV=production
ENVEOF
            echo ".env 已更新"

            # 4. Docker Compose 构建并部署
            echo ""
            echo "[3/4] 🐳 Docker 构建部署..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans

            # 5. 等待服务启动并验证
            echo ""
            echo "[4/4] ✅ 验证部署..."
            sleep 15

            # 检查所有容器状态
            docker compose ps

            # 验证 API 健康
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo ""
                echo "✅ API 健康检查通过！"
                break
              fi
              echo "等待服务启动... ($i/5)"
              sleep 5
            done

            # 首次部署：运行种子数据
            TREE_COUNT=$(docker compose exec -T server wget -qO- http://localhost:4000/api/v1/trees/meta/stats 2>/dev/null | grep -o '"total":[0-9]*' | grep -o '[0-9]*' || echo "0")
            if [ "$TREE_COUNT" = "0" ] || [ -z "$TREE_COUNT" ]; then
              echo ""
              echo "📦 首次部署，导入种子数据..."
              docker compose exec -T server tsx apps/server/src/scripts/seed-trees.ts || true
            fi

            echo ""
            echo "=========================================="
            echo "  ✅ 部署完成！"
            echo "=========================================="
            echo "  🌐 官网: http://$(curl -sf ifconfig.me || echo '106.53.112.26')"
            echo "  🔧 后台: http://$(curl -sf ifconfig.me || echo '106.53.112.26')/admin"
            echo "  📡 API:  http://$(curl -sf ifconfig.me || echo '106.53.112.26')/api/health"
            echo "=========================================="
          DEPLOY_SCRIPT

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "### 🌳 红艺花木部署结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **时间**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [访问官网](http://106.53.112.26)" >> $GITHUB_STEP_SUMMARY
