name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_VISION_API_KEY: ${{ secrets.DOUBAO_VISION_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          ssh $SERVER_USER@$SERVER_HOST "bash -s -- '$REPO_URL' '$JWT_SECRET' '$DOUBAO_API_KEY' '$DOUBAO_VISION_API_KEY' '$FAL_KEY'" << 'ENDSSH'
          set -e
          REPO_URL="$1"
          JWT_SECRET="$2"
          DOUBAO_API_KEY="$3"
          DOUBAO_VISION_API_KEY="$4"
          FAL_KEY="$5"
          PROJECT_DIR="/opt/hongyi"

          echo "=== Deploy started at $(date) ==="

          # Install Docker if needed
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com | sh
            systemctl start docker
            systemctl enable docker
            mkdir -p /etc/docker
            echo '{"registry-mirrors":["https://docker.xuanyuan.me"],"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}' > /etc/docker/daemon.json
            systemctl daemon-reload
            systemctl restart docker
          fi

          # Clone or pull
          if [ ! -d "$PROJECT_DIR/.git" ]; then
            rm -rf "$PROJECT_DIR"
            git clone "$REPO_URL" "$PROJECT_DIR"
          fi
          cd "$PROJECT_DIR"
          git fetch origin main
          git reset --hard origin/main
          echo "Version: $(git log --oneline -1)"

          # Create .env
          echo "JWT_SECRET=${JWT_SECRET}" > .env
          echo "DOUBAO_API_KEY=${DOUBAO_API_KEY}" >> .env
          echo "DOUBAO_VISION_API_KEY=${DOUBAO_VISION_API_KEY}" >> .env
          echo "FAL_KEY=${FAL_KEY}" >> .env
          echo "FAL_PROXY_URL=http://43.129.236.142:8462" >> .env
          echo "NEXT_PUBLIC_API_URL=" >> .env
          echo "NODE_ENV=production" >> .env

          # Stop Baota nginx to free port 80
          nginx -s stop 2>/dev/null || true
          systemctl stop nginx 2>/dev/null || true

          # Docker build and deploy (with error capture)
          echo "=== Docker build starting ==="
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans 2>&1 || {
            echo "=== Docker build FAILED ==="
            echo "--- Server container logs ---"
            docker compose logs --tail=50 server 2>&1 || true
            echo "--- Docker ps ---"
            docker ps -a 2>&1 || true
            echo "--- Disk space ---"
            df -h / 2>&1 || true
            exit 1
          }
          echo "=== Docker build completed ==="

          # Reload nginx config (bind mount updates the file but nginx needs reload)
          docker compose exec -T nginx nginx -s reload 2>/dev/null || docker compose restart nginx || true
          echo "=== Nginx config reloaded ==="

          # Health check
          sleep 15
          docker compose ps
          HEALTH_OK=0
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Health check passed!"
              HEALTH_OK=1
              break
            fi
            echo "Waiting... ($i/6)"
            docker compose logs --tail=5 server 2>&1 || true
            sleep 5
          done
          if [ "$HEALTH_OK" = "0" ]; then
            echo "=== Health check FAILED — server logs ==="
            docker compose logs --tail=30 server 2>&1 || true
          fi

          # Seed data on first deploy
          TREE_COUNT=$(docker compose exec -T server wget -qO- http://localhost:4000/api/v1/trees/meta/stats 2>/dev/null | grep -o '"total":[0-9]*' | grep -o '[0-9]*' || echo "0")
          if [ "$TREE_COUNT" = "0" ] || [ -z "$TREE_COUNT" ]; then
            echo "Seeding data..."
            docker compose exec -T server tsx apps/server/src/scripts/seed-trees.ts || true
          fi

          echo "=== Deploy complete ==="
          ENDSSH
