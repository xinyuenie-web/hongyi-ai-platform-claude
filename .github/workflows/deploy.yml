name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_VISION_API_KEY: ${{ secrets.DOUBAO_VISION_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          ssh $SERVER_USER@$SERVER_HOST "bash -s -- '$REPO_URL' '$JWT_SECRET' '$DOUBAO_API_KEY' '$DOUBAO_VISION_API_KEY' '$FAL_KEY' '$DASHSCOPE_API_KEY' '$OPENAI_API_KEY'" << 'ENDSSH'
          set -e
          REPO_URL="$1"
          JWT_SECRET="$2"
          DOUBAO_API_KEY="$3"
          DOUBAO_VISION_API_KEY="$4"
          FAL_KEY="$5"
          DASHSCOPE_API_KEY="$6"
          OPENAI_API_KEY="$7"
          PROJECT_DIR="/opt/hongyi"

          echo "=== Deploy started at $(date) ==="

          # Install Docker if needed
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com | sh
            systemctl start docker
            systemctl enable docker
          fi

          # Fix Docker registry: try multiple mirrors (Docker Hub blocked in China)
          mkdir -p /etc/docker

          # Pre-pull base image trying multiple mirrors until one works
          echo "=== Pulling base image via mirrors ==="
          MIRRORS=("docker.xuanyuan.me" "docker.m.daocloud.io" "hub.rat.dev" "docker.1ms.run")
          PULLED=0
          WORKING_MIRROR=""
          for mirror in "${MIRRORS[@]}"; do
            echo "Trying mirror: $mirror ..."
            if docker pull "$mirror/library/node:20-alpine" 2>&1; then
              docker tag "$mirror/library/node:20-alpine" node:20-alpine
              docker tag "$mirror/library/node:20-alpine" docker.io/library/node:20-alpine
              echo "SUCCESS via $mirror"
              WORKING_MIRROR="$mirror"
              PULLED=1
              break
            fi
            echo "Mirror $mirror failed, trying next..."
          done
          if [ "$PULLED" = "0" ]; then
            echo "WARNING: All mirrors failed, trying direct..."
            docker pull node:20-alpine || true
          fi

          # Also pull nginx and mongo if needed
          for img in nginx:alpine mongo:7; do
            if ! docker image inspect "$img" >/dev/null 2>&1; then
              for mirror in "${MIRRORS[@]}"; do
                base="${img%%:*}"; tag="${img#*:}"
                if docker pull "$mirror/library/$base:$tag" 2>&1; then
                  docker tag "$mirror/library/$base:$tag" "$img"
                  break
                fi
              done
            fi
          done

          # Configure working mirror in daemon.json so BuildKit also uses it
          if [ -n "$WORKING_MIRROR" ]; then
            echo "{\"registry-mirrors\":[\"https://$WORKING_MIRROR\"],\"log-driver\":\"json-file\",\"log-opts\":{\"max-size\":\"10m\",\"max-file\":\"3\"}}" > /etc/docker/daemon.json
          else
            echo '{"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}' > /etc/docker/daemon.json
          fi
          systemctl daemon-reload
          systemctl restart docker
          sleep 3

          # Clone or pull
          if [ ! -d "$PROJECT_DIR/.git" ]; then
            rm -rf "$PROJECT_DIR"
            git clone "$REPO_URL" "$PROJECT_DIR"
          fi
          cd "$PROJECT_DIR"
          git fetch origin main
          git reset --hard origin/main
          echo "Version: $(git log --oneline -1)"

          # Create .env
          echo "JWT_SECRET=${JWT_SECRET}" > .env
          echo "DOUBAO_API_KEY=${DOUBAO_API_KEY}" >> .env
          echo "DOUBAO_VISION_API_KEY=${DOUBAO_VISION_API_KEY}" >> .env
          echo "FAL_KEY=${FAL_KEY}" >> .env
          echo "DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}" >> .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "FAL_PROXY_URL=http://43.129.236.142:8462" >> .env
          echo "NEXT_PUBLIC_API_URL=" >> .env
          echo "NODE_ENV=production" >> .env

          # Stop Baota nginx to free port 80
          nginx -s stop 2>/dev/null || true
          systemctl stop nginx 2>/dev/null || true

          # Clean up Docker to free disk space (very aggressive — small VPS)
          docker builder prune -af 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
          echo "=== Docker cleanup done, disk: $(df -h / | tail -1 | awk '{print $4}') free ==="

          # Docker build and deploy
          echo "=== Docker build starting ==="
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans 2>&1 || {
            echo "=== Docker build FAILED ==="
            echo "--- Server container logs ---"
            docker compose logs --tail=50 server 2>&1 || true
            echo "--- Docker ps ---"
            docker ps -a 2>&1 || true
            echo "--- Disk space ---"
            df -h / 2>&1 || true
            exit 1
          }
          echo "=== Docker build completed ==="

          # Health check
          sleep 15
          docker compose ps || true
          HEALTH_OK=0
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "Health check passed!"
              HEALTH_OK=1
              break
            fi
            echo "Waiting... ($i/6)"
            docker compose logs --tail=5 server 2>&1 || true
            sleep 5
          done
          if [ "$HEALTH_OK" = "0" ]; then
            echo "=== Health check FAILED — server logs ==="
            docker compose logs --tail=30 server 2>&1 || true
          fi

          # Seed data on first deploy
          TREE_COUNT=$(docker compose exec -T server wget -qO- http://localhost:4000/api/v1/trees/meta/stats 2>/dev/null | grep -o '"total":[0-9]*' | grep -o '[0-9]*' || echo "0")
          if [ "$TREE_COUNT" = "0" ] || [ -z "$TREE_COUNT" ]; then
            echo "Seeding data..."
            docker compose exec -T server tsx apps/server/src/scripts/seed-trees.ts || true
          fi

          echo "=== Deploy complete ==="
          ENDSSH
