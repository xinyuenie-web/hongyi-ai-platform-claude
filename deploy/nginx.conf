# 红艺AI花木平台 - Nginx 站点配置
# 适用于宝塔面板 Nginx 配置
# 将此文件内容复制到宝塔面板的站点配置中

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream express_upstream {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 80;
    # 暂时使用 IP 访问，域名备案后取消注释
    server_name 106.53.112.26;
    # server_name 106.53.112.26 ai花木.com www.ai花木.com;

    # 上传文件大小限制 50MB
    client_max_body_size 50m;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # 静态资源缓存 - Next.js 构建产物
    location /_next/static {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 静态资源缓存 - 图片/CSS/JS
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_upstream;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # API 请求代理到 Express 后端 (端口 4000)
    location /api {
        proxy_pass http://express_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 上传文件路由（如果有单独的上传接口）
    location /uploads {
        proxy_pass http://express_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # 所有其他请求代理到 Next.js 前端 (端口 3000)
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 访问日志和错误日志
    access_log /www/wwwlogs/hongyi.access.log;
    error_log /www/wwwlogs/hongyi.error.log;
}
